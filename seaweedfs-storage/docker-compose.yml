services:
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-master
    ports:
      - "${SEAWEEDFS_MASTER_PORT}:9333"
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0"
    volumes:
      - seaweedfs_master_data:/data
    networks:
      - blog-realm-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-volume
    ports:
      - "${SEAWEEDFS_VOLUME_PORT}:8080"
    command: "volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080 -max=100"
    volumes:
      - seaweedfs_volume_data:/data
    networks:
      - blog-realm-network
    depends_on:
      seaweedfs-master:
        condition: service_healthy

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-filer
    ports:
      - "${SEAWEEDFS_FILER_PORT}:8888"
    command: "filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0"
    volumes:
      - seaweedfs_filer_data:/data
    networks:
      - blog-realm-network
    depends_on:
      - seaweedfs-volume

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-s3
    ports:
      - "${SEAWEEDFS_S3_PORT}:8333"
    command: "s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0 -port=8333 -config=/etc/seaweedfs/s3.json"
    volumes:
      - ./s3.json:/etc/seaweedfs/s3.json:ro
    networks:
      - blog-realm-network
    depends_on:
      - seaweedfs-filer

volumes:
  seaweedfs_master_data:
  seaweedfs_volume_data:
  seaweedfs_filer_data:

networks:
  blog-realm-network:
    external: true
