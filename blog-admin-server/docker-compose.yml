services:
  blog-admin-server:
    build: .
    container_name: blog-admin-server
    ports:
      - "4000:4000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DB_HOST: blog-postgres
      SPRING_DB_PORT: 5432
      SPRING_DB_NAME: ${SPRING_DB_NAME:-blog}
      SPRING_DB_USER: ${SPRING_DB_USER:-admin}
      SPRING_DB_PASSWORD: ${SPRING_DB_PASSWORD:-password}
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/blog-realm
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/blog-realm/protocol/openid-connect/certs
      KEYCLOAK_REALM: blog-realm
      KEYCLOAK_CLIENT_ID: blog-admin
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      SEAWEEDFS_ENDPOINT: http://seaweedfs-s3:8333
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:-blog_admin}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:-blog_admin_secret}
      SEAWEEDFS_BUCKET: blog-images
      SEAWEEDFS_PUBLIC_URL: ${SEAWEEDFS_PUBLIC_URL:-http://localhost:8333}
      PUBLIC_API_URL: http://blog-public-server:4001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    networks:
      - blog-realm-network

networks:
  blog-realm-network:
    external: true
